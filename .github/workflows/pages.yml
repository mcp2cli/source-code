name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Required for the official GitHub Pages deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize concurrent deploys; cancel superseded in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        run: pnpm build
        env:
          # Honour the base path that Pages will actually serve us from.
          # For a project site this is /<repo>/ — we already hard-code
          # /source-code in astro.config.mjs; this env just pins it.
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
